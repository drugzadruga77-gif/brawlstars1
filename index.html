<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Stats Pro Max</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at 50% 0%, #1a2238 0%, #05070f 100%); color: #fff; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; padding: 20px 10px; -webkit-font-smoothing: antialiased; }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, rgba(241,196,15,.06) 0%, transparent 40%), radial-gradient(circle at 20% 60%, rgba(52,152,219,.06) 0%, transparent 40%); pointer-events: none; transform: translate3d(0,0,0); }
        .app-container { width: 100%; max-width: 440px; z-index: 1; }
        .screen { width: 100%; display: flex; flex-direction: column; gap: 16px; transform: translate3d(0,0,0); will-change: transform, opacity; animation: screenIn .35s cubic-bezier(.25, 1, .5, 1) both; contain: paint; }
        @keyframes screenIn { from { opacity: 0; transform: translate3d(0,8px,0) scale(.98); } to { opacity: 1; transform: translate3d(0,0,0) scale(1); } }
        .flex-center { align-items: center; justify-content: center; min-height: 75vh; }
        .header { text-align: center; margin: 25px 0; }
        .logo-icon { font-size: 52px; filter: drop-shadow(0 0 15px rgba(241,196,15,.6)); animation: float 2.5s ease-in-out infinite; display: inline-block; will-change: transform; }
        @keyframes float { 0%, 100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-6px,0); } }
        h1 { font-size: 30px; font-weight: 950; letter-spacing: .5px; background: linear-gradient(135deg, #fff 40%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-top: 3px; }
        .search-container { position: relative; display: flex; align-items: center; border-radius: 20px; background: rgba(20,26,41,.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.06); padding: 4px; box-shadow: 0 12px 40px rgba(0,0,0,.4); }
        #playerTag { width: 100%; padding: 18px 65px 18px 20px; background: transparent; border: none; color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 1px; outline: none; text-transform: uppercase; }
        #playerTag::placeholder { color: #4e5d78; text-transform: none; letter-spacing: 0; }
        .search-box-btn { position: absolute; right: 6px; width: 50px; height: 50px; background: linear-gradient(135deg, #ffe066 0%, #f1c40f 100%); border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(241,196,15,.4); transform: translate3d(0,0,0); }
        .search-box-btn:active { transform: translate3d(0,0,0) scale(.9); }
        .search-box-btn svg { stroke: #000; pointer-events: none; }
        .recent-search { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 14px; border-radius: 18px; text-align: center; font-size: 13px; color: #8f9cae; cursor: pointer; }
        .recent-search span { color: #f1c40f; font-weight: 800; }
        .spinner { width: 55px; height: 55px; border: 5px solid rgba(241,196,15,.05); border-top-color: #f1c40f; border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 18px; will-change: transform; }
        .loading-text { font-size: 15px; font-weight: 900; color: #63758a; letter-spacing: 2px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .top-nav-row { display: flex; justify-content: space-between; gap: 12px; }
        .btn-back, .btn-refresh { flex: 1; padding: 14px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; }
        .btn-back { background: rgba(255,255,255,.03); color: #8f9cae; border: 1px solid rgba(255,255,255,.05); }
        .btn-back:active { transform: translate3d(-3px,0,0); }
        .btn-refresh { background: rgba(241,196,15,.06); color: #f1c40f; border: 1px solid rgba(241,196,15,.15); }
        .btn-refresh:active { transform: translate3d(0,0,0) scale(.97); }
        .glass-card { background: rgba(18,24,36,.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,.05); box-shadow: 0 15px 35px rgba(0,0,0,.35); transform: translate3d(0,0,0); }
        .player-main-card { border-radius: 28px; padding: 25px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .avatar-container { width: 95px; height: 95px; border-radius: 24px; overflow: hidden; border: 3.5px solid #24304a; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,.4); background-color: #171f30; transform: translate3d(0,0,0); }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; image-rendering: -webkit-optimize-contrast; }
        #playerName { font-size: 26px; font-weight: 950; letter-spacing: .3px; }
        .player-tag-sub { font-size: 12px; color: #52637a; font-weight: 800; margin-top: 2px; }
        .player-badges { display: flex; gap: 8px; margin-top: 10px; }
        .badge { padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .club-badge { background-color: rgba(52,152,219,.12); color: #3498db; border: 1px solid rgba(52,152,219,.15); }
        .level-badge { background-color: rgba(255,255,255,.03); color: #fff; border: 1px solid rgba(255,255,255,.05); }
        .trophy-big-box { width: 100%; margin-top: 18px; background: rgba(0,0,0,.2); border-radius: 20px; padding: 16px; text-align: center; border: 1px solid rgba(255,255,255,.02); box-shadow: inset 0 2px 8px rgba(0,0,0,.4); }
        .t-big-val { font-size: 34px; font-weight: 1000; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,.1); }
        .t-big-record { font-size: 11px; color: #6b7c96; font-weight: 800; margin-top: 2px; letter-spacing: .5px; }
        .tabs-container { background: rgba(0,0,0,.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,.04); padding: 5px; border-radius: 18px; display: flex; gap: 4px; box-shadow: inset 0 2px 6px rgba(0,0,0,.3); }
        .tab-item { flex: 1; padding: 12px; background: none; border: none; color: #6b7c96; font-size: 14px; font-weight: 800; border-radius: 14px; cursor: pointer; transform: translate3d(0,0,0); }
        .tab-item.active { background-color: #fff; color: #000; box-shadow: 0 6px 15px rgba(255,255,255,.15); }
        .section-title { font-size: 15px; font-weight: 900; margin: 16px 0 6px 4px; color: #8f9cae; text-transform: uppercase; letter-spacing: .3px; }
        .stats-list-card { border-radius: 22px; padding: 4px 16px; }
        .list-row { display: flex; justify-content: space-between; padding: 14px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,.03); color: #8f9cae; font-weight: 700; }
        .list-row:last-child { border: none; }
        .list-row strong { color: #fff; font-size: 17px; font-weight: 900; }
        .collection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coll-box { border-radius: 18px; padding: 14px; display: flex; flex-direction: column; gap: 4px; }
        .coll-box span { font-size: 11px; color: #6b7c96; font-weight: 800; text-transform: uppercase; }
        .coll-val strong { font-size: 18px; color: #fff; font-weight: 900; }
        .today-stats-card { border-radius: 24px; padding: 16px; }
        .info-sub-row { font-size: 11px; color: #4e5d78; margin-bottom: 12px; text-align: center; font-weight: 700; }
        .today-main-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .today-mini-box { flex: 1; background: rgba(0,0,0,.15); border: 1px solid rgba(255,255,255,.02); padding: 12px; border-radius: 16px; text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,.2); }
        .today-mini-box span { font-size: 11px; color: #6b7c96; font-weight: 800; display: block; margin-bottom: 4px; }
        .today-mini-box strong { font-size: 22px; font-weight: 950; }
        .positive { color: #2ecc71; text-shadow: 0 0 10px rgba(46,204,113,.15); }
        .negative { color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,.15); }
        .results-bar-title { font-size: 11px; font-weight: 800; color: #6b7c96; text-align: center; margin-bottom: 6px; }
        .winrate-bar-container { display: flex; width: 100%; height: 9px; border-radius: 5px; overflow: hidden; background-color: rgba(0,0,0,.4); margin-bottom: 6px; box-shadow: inset 0 1px 3px rgba(0,0,0,.4); }
        .bar-segment { height: 100%; transition: width .4s cubic-bezier(.16,1,.3,1); }
        .bar-segment.win { background: linear-gradient(90deg,#2ecc71,#27ae60); }
        .bar-segment.draw { background: linear-gradient(90deg,#f1c40f,#f39c12); }
        .bar-segment.loss { background: linear-gradient(90deg,#e74c3c,#c0392b); }
        .winrate-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; margin-bottom: 16px; }
        .lbl-win { color: #2ecc71; } .lbl-draw { color: #f1c40f; } .lbl-loss { color: #e74c3c; }
        .time-in-game { text-align: center; font-size: 13px; color: #8f9cae; border-top: 1px solid rgba(255,255,255,.03); padding-top: 14px; font-weight: 600; }
        .time-in-game strong { color: #fff; font-weight: 900; background: linear-gradient(135deg,#ffe066 0%,#f1c40f 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
<body>
<div class="app-container">
    <div id="screenSearch" class="screen">
        <div class="header"><div class="logo-icon">🏆</div><h1>BRAWL STATS</h1></div>
        <div class="search-container">
            <input type="text" id="playerTag" placeholder="# 2V0ULOGQV8">
            <button id="searchBtn" class="search-box-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>
        <div id="recentSearchBox" class="recent-search hidden" onclick="searchRecent()">⏱️ Последний поиск: <span id="recentTag">#2V0ULOGQV8</span></div>
    </div>
    <div id="screenLoading" class="screen hidden flex-center">
        <div class="spinner"></div>
        <div class="loading-text">ЗАГРУЗКА ПРОФИЛЯ</div>
    </div>
    <div id="screenResults" class="screen hidden">
        <div class="top-nav-row"><button class="btn-back" onclick="showScreen('screenSearch')">❮ Назад</button><button class="btn-refresh" onclick="reloadCurrentProfile()">🔄 Обновить</button></div>
        <div class="player-main-card glass-card">
            <div class="avatar-container"><img id="playerAvatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></div>
            <h2 id="playerName">---</h2>
            <div id="playerTagSub" class="player-tag-sub">#---</div>
            <div class="player-badges">
                <div class="badge club-badge">👤 <span id="clubName">---</span></div>
                <div class="badge level-badge">⭐ Уровень <span id="playerLevel">0</span></div>
            </div>
            <div class="trophy-big-box">
                <div class="t-big-val" id="resTrophies">0</div>
                <div class="t-big-record">РЕКОРД: <span id="resMaxTrophies">0</span></div>
            </div>
        </div>
        <div class="tabs-container">
            <button id="btnTabProfil" class="tab-item active" onclick="switchTab('tabProfil')">Профиль</button>
            <button id="btnTabBrawlers" class="tab-item" onclick="switchTab('tabBrawlers')">Бойцы (<span id="brawlersTabCount">0</span>)</button>
            <button id="btnTabBattles" class="tab-item" onclick="switchTab('tabBattles')">Бои</button>
        </div>
        <div id="tabProfil" class="tab-content">
            <div class="section-title">💛 Победы</div>
            <div class="stats-list-card glass-card">
                <div class="list-row"><span>3 на 3</span> <strong id="stat3v3">0</strong></div>
                <div class="list-row"><span>Solo</span> <strong id="statSolo">0</strong></div>
                <div class="list-row"><span>Duo</span> <strong id="statDuo">0</strong></div>
            </div>
            <div class="section-title">⚡ Коллекция</div>
            <div class="collection-grid">
                <div class="coll-box glass-card"><span>Гаджеты</span><div class="coll-val"><strong id="gadgetsCount">0/210</strong></div></div>
                <div class="coll-box glass-card"><span>Звёздные силы</span><div class="coll-val"><strong id="starPowersCount">0/210</strong></div></div>
                <div class="coll-box glass-card"><span>Снаряжение</span><div class="coll-val"><strong id="gearsCount">0</strong></div></div>
                <div class="coll-box glass-card"><span>Гиперзаряды</span><div class="coll-val"><strong id="hypersCount">0</strong></div></div>
            </div>
            <div class="section-title">🕒 За сегодня</div>
            <div class="today-stats-card glass-card">
                <div class="info-sub-row">ℹ️ Оценка по последним 50 боям</div>
                <div class="today-main-row">
                    <div class="today-mini-box"><span>СЫГРАНО</span><strong id="todayPlayed">0</strong></div>
                    <div class="today-mini-box"><span>ТРОФЕИ</span><strong id="todayTrophies" class="positive">+0</strong></div>
                </div>
                <div class="results-bar-title">РЕЗУЛЬТАТЫ</div>
                <div class="winrate-bar-container">
                    <div id="barWin" class="bar-segment win" style="width:0%"></div>
                    <div id="barDraw" class="bar-segment draw" style="width:0%"></div>
                    <div id="barLoss" class="bar-segment loss" style="width:0%"></div>
                </div>
                <div class="winrate-labels"><span class="lbl-win"><span id="txtWin">0</span> В</span><span class="lbl-draw"><span id="txtDraw">0</span> Н</span><span class="lbl-loss"><span id="txtLoss">0</span> П</span></div>
                <div class="time-in-game">Примерное время in game: <strong id="timePlayed">0ч 0м</strong></div>
            </div>
        </div>
        <div id="tabBrawlers" class="tab-content hidden">
            <input type="text" id="brawlerSearchInput" placeholder="🔍 Поиск бойца...">
            <div class="brawlers-real-grid" id="brawlersContainer"></div>
        </div>
        <div id="tabBattles" class="tab-content hidden">
            <div id="battleLogContainer" class="battle-log-list"></div>
        </div>
    </div>
</div>
