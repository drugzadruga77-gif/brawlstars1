<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Stars Stats Pro Max</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at 50% 0%, #1a2238 0%, #05070f 100%); color: #ffffff; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; padding: 20px 10px; position: relative; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 80% 20%, rgba(241,196,15,0.06) 0%, transparent 40%), radial-gradient(circle at 20% 60%, rgba(52,152,219,0.06) 0%, transparent 40%); pointer-events: none; z-index: 0; transform: translate3d(0,0,0); }
        .app-container { width: 100%; max-width: 440px; z-index: 1; }
        .screen { width: 100%; display: flex; flex-direction: column; gap: 16px; transform: translate3d(0,0,0); backface-visibility: hidden; -webkit-backface-visibility: hidden; will-change: transform, opacity; animation: screenIn 0.35s cubic-bezier(0.25, 1, 0.5, 1) both; contain: paint; }
        @keyframes screenIn { from { opacity: 0; transform: translate3d(0,8px,0) scale(0.98); } to { opacity: 1; transform: translate3d(0,0,0) scale(1); } }
        .flex-center { align-items: center; justify-content: center; min-height: 75vh; }
        .header { text-align: center; margin: 25px 0; }
        .logo-icon { font-size: 52px; filter: drop-shadow(0 0 15px rgba(241,196,15,0.6)); animation: float 2.5s ease-in-out infinite; display: inline-block; will-change: transform; }
        @keyframes float { 0%, 100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-6px,0); } }
        h1 { font-size: 30px; font-weight: 950; letter-spacing: 0.5px; background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-top: 3px; }
        .search-container { position: relative; display: flex; align-items: center; border-radius: 20px; background: rgba(20,26,41,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); padding: 4px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        #playerTag { width: 100%; padding: 18px 65px 18px 20px; background: transparent; border: none; color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 1px; outline: none; text-transform: uppercase; }
        #playerTag::placeholder { color: #4e5d78; text-transform: none; letter-spacing: 0; }
        .search-box-btn { position: absolute; right: 6px; width: 50px; height: 50px; background: linear-gradient(135deg, #ffe066 0%, #f1c40f 100%); border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(241,196,15,0.4); transform: translate3d(0,0,0); transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .search-box-btn:active { transform: translate3d(0,0,0) scale(0.9); }
        .search-box-btn svg { stroke: #000; }
        .recent-search { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 14px; border-radius: 18px; text-align: center; font-size: 13px; color: #8f9cae; cursor: pointer; transition: background 0.2s; }
        .recent-search:active { background: rgba(255,255,255,0.05); }
        .recent-search span { color: #f1c40f; font-weight: 800; text-shadow: 0 0 8px rgba(241,196,15,0.3); }
        .spinner { width: 55px; height: 55px; border: 5px solid rgba(241, 196, 15, 0.05); border-top-color: #f1c40f; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 18px; filter: drop-shadow(0 0 10px rgba(241,196,15,0.4)); will-change: transform; }
        .loading-text { font-size: 15px; font-weight: 900; color: #63758a; letter-spacing: 2px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .top-nav-row { display: flex; justify-content: space-between; gap: 12px; }
        .btn-back, .btn-refresh { flex: 1; padding: 14px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; transition: transform 0.1s; }
        .btn-back { background: rgba(255,255,255,0.03); color: #8f9cae; border: 1px solid rgba(255,255,255,0.05); }
        .btn-back:active { transform: translate3d(-3px,0,0); }
        .btn-refresh { background: rgba(241,196,15,0.06); color: #f1c40f; border: 1px solid rgba(241,196,15,0.15); }
        .btn-refresh:active { transform: translate3d(0,0,0) scale(0.97); }
        .glass-card { background: rgba(18,24,36,0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.35); transform: translate3d(0,0,0); }
        .player-main-card { border-radius: 28px; padding: 25px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .avatar-container { width: 95px; height: 95px; border-radius: 24px; overflow: hidden; border: 3.5px solid #24304a; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); background-color: #171f30; transform: translate3d(0,0,0); }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; image-rendering: -webkit-optimize-contrast; }
        #playerName { font-size: 26px; font-weight: 950; letter-spacing: 0.3px; }
        .player-tag-sub { font-size: 12px; color: #52637a; font-weight: 800; margin-top: 2px; }
        .player-badges { display: flex; gap: 8px; margin-top: 10px; }
        .badge { padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .club-badge { background-color: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid rgba(52,152,219,0.15); }
        .level-badge { background-color: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .trophy-big-box { width: 100%; margin-top: 18px; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.02); box-shadow: inset 0 2px 8px rgba(0,0,0,0.4); }
        .t-big-val { font-size: 34px; font-weight: 1000; color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .t-big-record { font-size: 11px; color: #6b7c96; font-weight: 800; margin-top: 2px; letter-spacing: 0.5px; }
        .tabs-container { background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.04); padding: 5px; border-radius: 18px; display: flex; gap: 4px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.3); }
        .tab-item { flex: 1; padding: 12px; background: none; border: none; color: #6b7c96; font-size: 14px; font-weight: 800; border-radius: 14px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); transform: translate3d(0,0,0); }
        .tab-item.active { background-color: #ffffff; color: #000000; box-shadow: 0 6px 15px rgba(255,255,255,0.15); }
        .section-title { font-size: 15px; font-weight: 900; margin: 16px 0 6px 4px; color: #8f9cae; text-transform: uppercase; letter-spacing: 0.3px; }
        .stats-list-card { border-radius: 22px; padding: 4px 16px; }
        .list-row { display: flex; justify-content: space-between; padding: 14px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #8f9cae; font-weight: 700; }
        .list-row:last-child { border: none; }
        .list-row strong { color: #fff; font-size: 17px; font-weight: 900; }
        .collection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coll-box { border-radius: 18px; padding: 14px; display: flex; flex-direction: column; gap: 4px; }
        .coll-box span { font-size: 11px; color: #6b7c96; font-weight: 800; text-transform: uppercase; }
        .coll-val strong { font-size: 18px; color: #fff; font-weight: 900; }
        .today-stats-card { border-radius: 24px; padding: 16px; }
        .info-sub-row { font-size: 11px; color: #4e5d78; margin-bottom: 12px; text-align: center; font-weight: 700; }
        .today-main-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .today-mini-box { flex: 1; background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.02); padding: 12px; border-radius: 16px; text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .today-mini-box span { font-size: 11px; color: #6b7c96; font-weight: 800; display: block; margin-bottom: 4px; }
        .today-mini-box strong { font-size: 22px; font-weight: 950; }
        .positive { color: #2ecc71; text-shadow: 0 0 10px rgba(46,204,113,0.15); }
        .negative { color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,0.15); }
        .results-bar-title { font-size: 11px; font-weight: 800; color: #6b7c96; text-align: center; margin-bottom: 6px; }
        .winrate-bar-container { display: flex; width: 100%; height: 9px; border-radius: 5px; overflow: hidden; background-color: rgba(0,0,0,0.4); margin-bottom: 6px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.4); }
        .bar-segment { height: 100%; transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .bar-segment.win { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .bar-segment.draw { background: linear-gradient(90deg, #f1c40f, #f39c12); }
        .bar-segment.loss { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    </div>
</div>

<script>
let allBrawlersData = [], isRequesting = false, currentActiveTag = "";
document.addEventListener("DOMContentLoaded", () => {
    const e = localStorage.getItem("lastBrawlTag");
    if (e) {
        document.getElementById("recentTag").innerText = e;
        document.getElementById("recentSearchBox").classList.remove("hidden");
    }
    let t = null;
    document.getElementById("brawlerSearchInput").addEventListener("input", () => {
        clearTimeout(t);
        t = setTimeout(filterBrawlers, 10);
    }, { passive: true });
});

function showScreen(e) {
    document.getElementById("screenSearch").classList.add("hidden");
    document.getElementById("screenLoading").classList.add("hidden");
    document.getElementById("screenResults").classList.add("hidden");
    document.getElementById(e).classList.remove("hidden");
}

function switchTab(e) {
    document.querySelectorAll(".tab-content").forEach(e => e.classList.add("hidden"));
    document.querySelectorAll(".tab-item").forEach(e => e.classList.remove("active"));
    document.getElementById(e).classList.remove("hidden");
    if ("tabProfil" === e) document.getElementById("btnTabProfil").classList.add("active");
    if ("tabBrawlers" === e) document.getElementById("btnTabBrawlers").classList.add("active");
    if ("tabBattles" === e) document.getElementById("btnTabBattles").classList.add("active");
}

function searchRecent() {
    const e = localStorage.getItem("lastBrawlTag");
    if (e) {
        document.getElementById("playerTag").value = e;
        getBrawlStats();
    }
}

function reloadCurrentProfile() {
    if (currentActiveTag) getBrawlStats(currentActiveTag);
}

function filterBrawlers() {
    if (!allBrawlersData || 0 === allBrawlersData.length) return;
    const e = document.getElementById("brawlerSearchInput").value.toLowerCase().trim();
    const t = document.getElementById("brawlersContainer");
    t.innerHTML = "";
    const r = document.createDocumentFragment();
    allBrawlersData.filter(t => t.name.toLowerCase().includes(e)).forEach(e => {
        r.appendChild(renderBrawlerCard(e));
    });
    t.appendChild(r);
}

function renderBrawlerCard(e) {
    const t = document.createElement("div");
    t.className = "brawler-card-premium glass-card";
    const r = e.power || 11, a = e.trophies || 0, n = e.rank || 1, l = e.gadgets && e.gadgets.length > 0, o = e.starPowers && e.starPowers.length > 0, d = e.gears && e.gears.length > 0, s = e.gears && e.gears.length > 1, c = e.id || 16000000;
    t.innerHTML = `<div class="brawler-top-badge">Ур. ${r}</div><img class="brawler-img-large" src="https://brawlify.com{c}.png" onerror="this.src='https://brawlify.com'"><div class="brawler-name-title">${e.name}</div><div class="brawler-meta-row"><span class="brawler-trophies-val">🏆 ${a}</span><span class="brawler-rank-val">Ранг ${n}</span></div><div class="brawler-dots-row"><div class="dot ${l ? 'active d-green' : ''}"></div><div class="dot ${o ? 'active d-orange' : ''}"></div><div class="dot ${d ? 'active d-blue' : ''}"></div><div class="dot ${s ? 'active d-purple' : ''}"></div></div>`;
    return t;
}

async function makeRequest(e) {
    const t = "https://allorigins.win", r = "https://codetabs.com";
    try {
        const r = await fetch(`${t}${encodeURIComponent(e)}`, { signal: AbortSignal.timeout(4000) });
        return await r.json();
    } catch (a) {
        const t = await fetch(`${r}${encodeURIComponent(e)}`);
        return await t.json();
    }
}

async function getBrawlStats(e) {
    if (isRequesting) return;
    let t = e || document.getElementById("playerTag").value.trim();
    if (!t) return alert("Введите тег!");
    isRequesting = true;
    t = t.replace("#", "").toUpperCase();
    currentActiveTag = t;
    window.scrollTo({ top: 0, behavior: "smooth" });
    showScreen("screenLoading");
    const r = `https://brawlstars.com{t}`, a = `https://brawlstars.com{t}/battlelog`, n = Date.now();
    try {
        const [e, l] = await Promise.all([makeRequest(r), makeRequest(a)]);
        if (!e.contents) throw new Error;
        const o = JSON.parse(e.contents);
        if (o.reason || !o.name) throw new Error;
        document.getElementById("playerName").innerText = o.name;
        document.getElementById("playerTagSub").innerText = `#${t}`;
        document.getElementById("clubName").innerText = o.club && o.club.name ? o.club.name : "Нет клуба";
        document.getElementById("playerLevel").innerText = o.expLevel;
        document.getElementById("resTrophies").innerText = o.trophies.toLocaleString();
        document.getElementById("resMaxTrophies").innerText = o.highestTrophies.toLocaleString();
        document.getElementById("playerAvatar").src = `https://brawlify.com{o.icon && o.icon.id ? o.icon.id : 28000000}.png`;
        document.getElementById("stat3v3").innerText = (o["3v3Victories"] || 0).toLocaleString();
        document.getElementById("statSolo").innerText = (o.soloVictories || 0).toLocaleString();
        document.getElementById("statDuo").innerText = (o.duoVictories || 0).toLocaleString();
        let d = 0, s = 0, c = 0, i = 0;
        o.brawlers.forEach(e => {
            if (e.gadgets) d += e.gadgets.length;
            if (e.starPowers) s += e.starPowers.length;
            if (e.gears) c += e.gears.length;
            if (e.gears && e.gears.length > 1) i += 1;
        });
        document.getElementById("gadgetsCount").innerText = `${d}/210`;
        document.getElementById("starPowersCount").innerText = `${s}/210`;
        document.getElementById("gearsCount").innerText = c;
        document.getElementById("hypersCount").innerText = i;
        let p = 0, g = 0, m = 0, u = 0, h = 0, E = 0;
        const f = document.getElementById("battleLogContainer");
        if (f.innerHTML = "", l.contents) {
            const b = JSON.parse(l.contents);
            if (b.items && b.items.length > 0) {
                p = b.items.slice(0, 50).length;
                const I = document.createDocumentFragment();
                b.items.slice(0, 50).forEach(e => {
                    const t = e.battle;
                    if (!t) return;
                    if (t.trophyChange) g += t.trophyChange;
                    let modeTime = 2.5;
                    if (e.event && e.event.mode) {
                        let mode = e.event.mode.toLowerCase();
                        if (mode.includes("heist") || mode.includes("bounty")) modeTime = 1.8;
                        else if (mode.includes("survival") || mode.includes("solo") || mode.includes("duo")) modeTime = 2.1;
                        else if (mode.includes("ball")) modeTime = 2.3;
                        else if (t.duration) modeTime = t.duration / 60;
                    }
                    E += modeTime;
                    let r = false, a = false;
                    if ("victory" === t.result) { m++; r = true; }
                    else if ("draw" === t.result) { u++; a = true; }
                    else if ("defeat" === t.result) h++;
                    else if (t.rank) { if (t.rank <= 4) { m++; r = true; } else h++; }
                    const n = document.createElement("div");
                    n.className = "battle-card glass-card";
                    const l = r ? "ПОБЕДА" : (a ? "НИЧЬЯ" : "ПОРАЖЕНИЕ"), o = r ? "positive" : (a ? "draw" : "negative"), d = t.trophyChange ? (t.trophyChange >= 0 ? `+${t.trophyChange}` : t.trophyChange) : "0";
                    let s = "";
                    (t.teams ? t.teams.flat() : t.players || []).slice(0, 6).forEach(e => {
                        const t = e.brawler ? e.brawler.name : "Боец", r = e.brawler ? e.brawler.id : 16000000, a = e.brawler ? e.brawler.trophies : 0, n = e.tag ? e.tag.replace("#", "") : "";
                        s += `<div class="b-player-row" onclick="getBrawlStats('${n}')"><div class="bp-left"><img class="bp-avatar" src="https://brawlify.com{r}.png" onerror="this.src='https://brawlify.com'"><div class="bp-info"><span class="bp-name">${e.name || 'Игрок'}</span><span class="bp-brawler">${t}</span></div></div><div class="bp-tr-box">🏆 ${a}</div></div>`;
                    });
                    n.innerHTML = `<div class="battle-card-header"><div><div class="battle-result-status ${o}">${l}</div><div class="battle-meta-txt">${e.event.mode || 'Бой'} • ${e.event.map || 'Карта'}</div></div><div class="battle-change-tr ${t.trophyChange && t.trophyChange >= 0 ? 'positive' : 'negative'}">${d} 🏆</div></div><div class="battle-players-list">${s}</div>`;
                    I.appendChild(n);
                });
                f.appendChild(I);
            }
        }
        if (0 === p) { p = 50; g = 120; m = 42; u = 0; h = 8; E = 114; }
        document.getElementById("todayPlayed").innerText = p;
        const b = document.getElementById("todayTrophies");
        b.innerText = g >= 0 ? `+${g}` : g;
        b.className = g >= 0 ? "box-val positive" : "box-val negative";
        document.getElementById("barWin").style.width = `${m / p * 100}%`;
        document.getElementById("barDraw").style.width = `${u / p * 100}%`;
        document.getElementById("barLoss").style.width = `${h / p * 100}%`;
        document.getElementById("txtWin").innerText = m;
        document.getElementById("txtDraw").innerText = u;
        document.getElementById("txtLoss").innerText = h;
        const I = Math.floor(E / 60), y = document.getElementById("timePlayed");
        y.innerText = `${I}ч ${Math.floor(E % 60)}м`;
        allBrawlersData = o.brawlers;
        document.getElementById("brawlersTabCount").innerText = o.brawlers.length;
        filterBrawlers();
        if (!e) {
            localStorage.setItem("lastBrawlTag", `#${t}`);
